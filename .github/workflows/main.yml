name: snooker data update

on:
  push:
  schedule:
    - cron: '30 00 * * *'

jobs: 
  dbUpdate:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
        
    - name: Install dependencies
      run: python -m pip install -r requirements.txt
      
    - name: Update db Data
      run: python Code\update_db.py
      
    - name: Update parquet Data
      run: python Code\export_parquet.py
      
    - name: Commit Files 
      run: |
        git config --local user.name 'obrienjoey'
        git config --local user.email "obrienjoey@users.noreply.github.com"
        git add Database/* Parquet/*
        git commit -am "updated snooker data $(date)"
        git push origin main
      env:
        REPO_KEY: ${{secrets.GITHUB_TOKEN}}
        username: github-actions
