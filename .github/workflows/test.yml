name: CI Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r requirements.txt
        python -m pip install pytest pytest-cov responses ruff mypy types-requests
        
    - name: Lint with Ruff
      run: python -m ruff check Code/
      
    - name: Type check with Mypy
      run: python -m mypy Code/
      
    - name: Run Tests
      run: python -m pytest --cov=Code --cov-report=xml tests/
